
<div class="bg-white rounded-lg shadow-lg overflow-hidden transition-transform duration-300 ease-in-out hover:scale-105">
    {% if producto.imagen %}
    <img src="{{ producto.imagen.url }}" alt="{{ producto.nombre }}" class="w-full h-48 object-cover">
    {% endif %}
    <div class="p-4">
        <h3 class="text-xl font-semibold text-gray-800 mb-1 truncate">
            {{ producto.nombre }}
        </h3>
        <p class="text-gray-600 text-sm mb-3">
            {{ producto.descripcion|truncatechars:100 }}
        </p>
        <div class="flex items-center justify-between mt-2">
            <span class="text-2xl font-bold text-gray-900">
                ${{ producto.precio_efectivo|floatformat:0 }}
            </span>
            <a href="#" class="bg-indigo-600 text-white px-4 py-2 rounded-full text-sm font-medium hover:bg-indigo-700 transition-colors">
                Ver más
            </a>
        </div>
    </div>
</div>
